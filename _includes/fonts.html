<!-- Vollkorn for body text, served as subsetted woff2 by Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Vollkorn:ital,wght@0,400..900;1,400..900&display=swap">

<style>
    /** Lato for headers **/
    @font-face {
        font-family: "Lato";
        src: url("{{ "/assets/fonts/Lato/Lato-Regular.ttf" | relative_url }}") format("truetype");
        font-style: normal;
        font-display: swap;
    }

    /** Berkeley Mono for codeblocks **/

    @font-face {
        font-family: 'Berkeley Mono';
        font-weight: normal;
        font-style: normal;
        src: url("{{ "/assets/fonts/BerkeleyMono/BerkeleyMono-Regular.woff2" | relative_url }}") format('woff2'),
             url("{{ "/assets/fonts/BerkeleyMono/BerkeleyMono-Regular.woff" | relative_url }}") format('woff');
    }

    @font-face {
        font-family: 'Berkeley Mono';
        font-weight: normal;
        font-style: italic;
        src: url("{{ "/assets/fonts/BerkeleyMono/BerkeleyMono-Italic.woff2" | relative_url }}") format('woff2'),
             url("{{ "/assets/fonts/BerkeleyMono/BerkeleyMono-Italic.woff" | relative_url }}") format('woff');
    }

    @font-face {
        font-family: 'Berkeley Mono';
        font-weight: bold;
        font-style: normal;
        src: url("{{ "/assets/fonts/BerkeleyMono/BerkeleyMono-Bold.woff2" | relative_url }}") format('woff2'),
             url("{{ "/assets/fonts/BerkeleyMono/BerkeleyMono-Bold.woff" | relative_url }}") format('woff');
    }

    @font-face {
        font-family: 'Berkeley Mono';
        font-weight: bold;
        font-style: italic;
        src: url("{{ "/assets/fonts/BerkeleyMono/BerkeleyMono-BoldItalic.woff2" | relative_url }}") format('woff2'),
             url("{{ "/assets/fonts/BerkeleyMono/BerkeleyMono-BoldItalic.woff" | relative_url }}") format('woff');
    }
</style>
